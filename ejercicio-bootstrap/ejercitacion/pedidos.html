<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacer un pedido – Pizzería DDS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="estilos.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body>

  <nav>
    <a href="index.html" class="marca">🍕 Pizzería DDS</a>
    <a href="index.html">Inicio</a>
    <a href="horarios.html">Horarios</a>
    <a href="pedidos.html">Hacer un pedido</a>
  </nav>

  <div class="pagina">

    <div class="caja-formulario">
      <h1 class="titulo-pagina" style="text-align: left; margin-top: 0;">Adelantar pedido</h1>

      <form>

        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: María González">
        </div>

        <div class="campo">
          <label for="telefono">Teléfono de contacto</label>
          <input type="tel" id="telefono" name="telefono" placeholder="Ej: 011 4444-5555">
        </div>

        <div class="campo">
          <label for="hora">Hora de retiro</label>
          <input type="time" id="hora" name="hora">
        </div>

        <div class="campo">
          <label for="pizza">Pizza elegida</label>
          <select id="pizza" name="pizza">
            <option value="">— Seleccionar —</option>
            <option value="mozzarella">Mozzarella</option>
            <option value="fugazzeta">Fugazzeta</option>
            <option value="calabresa">Calabresa</option>
            <option value="4quesos">Cuatro quesos</option>
            <option value="napolitana">Napolitana</option>
            <option value="especial">Especial de la casa</option>
          </select>
        </div>

        <div class="campo">
          <label>Tamaño</label>
          <div class="opciones-radio">
            <label><input type="radio" name="tamanio" value="chica"> Chica (4 porciones)</label>
            <label><input type="radio" name="tamanio" value="grande" checked> Grande (8 porciones)</label>
          </div>
        </div>

        <div class="campo">
          <label for="notas">Notas adicionales</label>
          <textarea id="notas" name="notas" placeholder="Ej: sin cebolla, doble queso, etc."></textarea>
        </div>

        <button type="submit" class="boton-enviar">Enviar pedido</button>

      </form>
    </div>

  </div>

</body>

</html>
